services:
  projecttrak:
    build: .
    container_name: projecttrak
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /volume1/docker/projecttrak/data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/projecttrak.db
      - SESSION_SECRET=${SESSION_SECRET}
      - SETUP_KEY=${SETUP_KEY}